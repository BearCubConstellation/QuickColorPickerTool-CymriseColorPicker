name: Build Cymrise Color Picker

on:
  push:
    branches: [main, "release/**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Package lightweight exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path publish/win-x64 | Out-Null
          Copy-Item bin/Release/net48/ColorPicker.exe publish/win-x64/ColorPicker.exe
          if (Test-Path bin/Release/net48/ColorPicker.exe.config) { Copy-Item bin/Release/net48/ColorPicker.exe.config publish/win-x64/ }

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: CymriseColorPicker-lightweight-win-x64
          path: publish/win-x64
          if-no-files-found: error
