name: Build ColorPicker

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure native build
        run: cmake -S native -B build -A x64
      - name: Build Chinese and English editions
        run: cmake --build build --config Release --target ColorPicker ColorPickerEn
      - name: Upload Chinese executable
        uses: actions/upload-artifact@v4
        with:
          name: ColorPicker-zh-CN-win-x64
          path: build/Release/ColorPicker.exe
          if-no-files-found: error
      - name: Upload English executable
        uses: actions/upload-artifact@v4
        with:
          name: ColorPicker-en-US-win-x64
          path: build/Release/ColorPicker-en.exe
          if-no-files-found: error
