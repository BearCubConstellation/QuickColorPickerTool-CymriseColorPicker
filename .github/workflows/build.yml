name: Build Cymrise Color Picker

on:
  push:
    branches: [main, "release/**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure native build
        run: cmake -S native -B build -A x64
      - name: Build native release
        run: cmake --build build --config Release --target ColorPicker
      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: CymriseColorPicker-win-x64
          path: build/Release/ColorPicker.exe
          if-no-files-found: error
