name: Release Cymrise Color Picker

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure native build
        run: cmake -S native -B build -G "Visual Studio 17 2022" -A x64

      - name: Build native release
        run: cmake --build build --config Release --target ColorPicker

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content VERSION -Raw).Trim()
          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Package single executable
        shell: pwsh
        run: |
          Compress-Archive -Path build/Release/ColorPicker.exe -DestinationPath "CymriseColorPicker-v${{ steps.version.outputs.value }}-win-x64.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: Cymrise Color Picker v${{ steps.version.outputs.value }}
          body_path: RELEASE_NOTES_v1.2.1.md
          files: CymriseColorPicker-v${{ steps.version.outputs.value }}-win-x64.zip
          fail_on_unmatched_files: true
