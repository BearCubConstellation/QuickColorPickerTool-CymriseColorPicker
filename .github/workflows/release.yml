name: Release ColorPicker

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read and validate version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content VERSION -Raw).Trim()
          if ("${{ github.ref_type }}" -eq "tag" -and "${{ github.ref_name }}" -ne "v$version") {
            throw "Tag '${{ github.ref_name }}' must match VERSION 'v$version'."
          }
          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Configure native build
        run: cmake -S native -B build -A x64

      - name: Build Chinese and English releases
        run: cmake --build build --config Release --target ColorPicker ColorPickerEn

      - name: Package language editions
        shell: pwsh
        run: |
          Compress-Archive -Path build/Release/ColorPicker.exe -DestinationPath "ColorPicker-v${{ steps.version.outputs.value }}-zh-CN-win-x64.zip"
          Compress-Archive -Path build/Release/ColorPicker-en.exe -DestinationPath "ColorPicker-v${{ steps.version.outputs.value }}-en-US-win-x64.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: ColorPicker v${{ steps.version.outputs.value }}
          body: |
            Full change history: https://github.com/BearCubConstellation/ColorPicker/blob/main/CHANGELOG.md
          generate_release_notes: true
          files: |
            ColorPicker-v${{ steps.version.outputs.value }}-zh-CN-win-x64.zip
            ColorPicker-v${{ steps.version.outputs.value }}-en-US-win-x64.zip
          fail_on_unmatched_files: true
