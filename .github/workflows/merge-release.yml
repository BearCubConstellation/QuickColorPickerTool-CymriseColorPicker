name: Merge Release Cymrise Color Picker

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  release:
    if: github.event.pull_request.title == '[release] Cymrise Color Picker v1.2.2'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure native build
        run: cmake -S native -B build -A x64
      - name: Build native release
        shell: pwsh
        run: |
          cmake --build build --config Release --target ColorPicker *>&1 | Tee-Object -FilePath native-build.log
          exit $LASTEXITCODE
      - name: Upload native build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-build-log
          path: native-build.log
          if-no-files-found: warn
      - name: Read version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content VERSION -Raw).Trim()
          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
      - name: Package executable
        shell: pwsh
        run: |
          Compress-Archive -Path build/Release/ColorPicker.exe -DestinationPath "CymriseColorPicker-v${{ steps.version.outputs.value }}-win-x64.zip"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: Cymrise Color Picker v${{ steps.version.outputs.value }}
          body_path: RELEASE_NOTES_v1.2.2.md
          files: CymriseColorPicker-v${{ steps.version.outputs.value }}-win-x64.zip
          fail_on_unmatched_files: true
